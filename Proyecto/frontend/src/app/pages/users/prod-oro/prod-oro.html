<div class="container-fluid align-items-center justify-content-center"
    style="background-color: #97a5b6">
    <h3 class="fs-1 fw-bold pt-2"><strong>Lo Mejor en Joyeria de Oro</strong></h3>

    <div class="container-fluid" style="background-color: #97a5b6">

  <h3 class="fs-1 fw-bold pt-2 text-center">
    <strong>Lo Mejor en Joyería de Oro</strong>
  </h3>

  <div class="row pt-2">

    <div class="col-md-4 mb-4" *ngFor="let prod of productos">
      <div class="card h-100 shadow">

        <img [src]="prod.imagen || 'images/oro1.jpg'"
             class="card-img-top"
             style="height: 300px; object-fit: cover;">

        <div class="card-body">
          <h3 class="fs-5 fw-bold">{{ prod.nombre }}</h3>

          <h4 class="fs-6">
            Precio: ${{ prod.precio }}
          </h4>

          <ul>
            <li>{{ prod.accesorio }}</li>
            <li>Stock: {{ prod.existencias }}</li>
          </ul>
        </div>

      </div>
    </div>

  </div>
</div>
