<div class="container-fluid py-4 theme-page-light">
  <h3 class="catalog-title fs-1 fw-bold text-center mb-4">
    <strong>Lo Mejor en Productos de Oro</strong>
  </h3>

  <div class="row">
    <section class="col-lg-9 col-md-8">
      <div *ngIf="cargando" class="catalog-message">
        Cargando productos...
      </div>

      <div *ngIf="error" class="catalog-message error-message">
        {{ error }}
      </div>

      <div class="row" *ngIf="!cargando && !error">
        <div class="col-md-6 col-xl-4 mb-4" *ngFor="let producto of productosFiltrados">
          <a
            class="card h-100 shadow product-card product-link"
            [routerLink]="['/producto', producto._id]"
            [state]="{ producto: producto }">
            <img
              [src]="getImagenProducto(producto)"
              class="card-img-top product-image"
              [alt]="producto.nombre">

            <div class="card-body">
              <h5 class="fw-bold product-name">{{ producto.nombre }}</h5>
              <p class="fw-bold text-success">Precio: ${{ producto.precio }}</p>
              <p class="product-stock mb-0">Stock: {{ getStock(producto) }}</p>
            </div>
          </a>
        </div>

        <div class="col-12" *ngIf="!productosFiltrados.length">
          <div class="catalog-message">
            No hay productos que coincidan con los filtros seleccionados.
          </div>
        </div>
      </div>
    </section>

    <aside class="col-lg-3 col-md-4 mt-4 mt-md-0">
      <div class="card shadow">
        <div class="card-header text-white theme-header-dark">
          Filtros
        </div>

        <div class="card-body">
          <div class="form-check mb-2" *ngFor="let filtro of filtros">
            <input
              class="form-check-input"
              type="checkbox"
              [id]="filtro"
              [(ngModel)]="filtrosSeleccionados[filtro]">
            <label class="form-check-label" [for]="filtro">
              {{ filtro }}
            </label>
          </div>

          <button class="btn btn-primary w-100 mt-3" (click)="aplicarFiltros()">
            Aplicar filtros
          </button>
        </div>
      </div>
    </aside>
  </div>
</div>
