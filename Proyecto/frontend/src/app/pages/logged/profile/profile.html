<div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="profilePanel" style="width: 320px;">

  <!-- HEADER (perfil) -->
  <div class="offcanvas-header border-bottom">
    <div class="d-flex align-items-center gap-3">

      <!-- Foto -->
      <img 
        src="/images/logo_komi.gif" 
        class="rounded-circle"
        width="40"
        height="40"
      >

      <!-- Nombre -->
      <div>
        <strong class="fs-2">{{ nombreUsuario || 'Usuario' }}</strong>
      </div>

    </div>

    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>

  <!-- BODY -->
  <div class="offcanvas-body">

    <!-- Configuración -->
    <div class="dropdown w-100">
      <button 
        class="btn btn-outline-light w-100 text-start dropdown-toggle"
        type="button"
        data-bs-toggle="dropdown"
      >
        ⚙️ Configuración de cuenta
      </button>

      <ul class="dropdown-menu w-100">

        <li>
          <button class="dropdown-item" (click)="setSeccion('datos')">
            Datos personales
          </button>
        </li>

        <li>
          <button class="dropdown-item" (click)="setSeccion('seguridad')">
            Seguridad
          </button>
        </li>

        <li>
          <button class="dropdown-item" (click)="toggleDarkMode()">
            Modo oscuro
          </button>
        </li>

      </ul>
    </div>

    <hr>

    <!-- CONTENIDO DINÁMICO -->
    <div *ngIf="seccion === 'datos'">
      <h6>Datos personales</h6>
      <input class="form-control mb-2" placeholder="Nombre">
      <input class="form-control mb-2" placeholder="Correo">
      <button class="btn btn-primary w-100">Guardar</button>
    </div>

    <div *ngIf="seccion === 'seguridad'">
      <h6>Seguridad</h6>
      <input type="password" class="form-control mb-2" placeholder="Nueva contraseña">
      <input type="password" class="form-control mb-2" placeholder="Confirmar contraseña">
      <button class="btn btn-warning w-100">Actualizar</button>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="p-3 border-top">
    <button class="btn btn-danger w-100" (click)="logout()">
      Cerrar sesión
    </button>
  </div>

</div>
