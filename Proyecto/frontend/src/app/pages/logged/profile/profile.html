<section
  *ngIf="nombreUsuario && menuAbierto"
  id="profilePanel"
  class="profile-dropdown">
  <div class="profile-summary">
    <img
      [src]="fotoUsuario"
      (error)="onAvatarError($event)"
      alt="Avatar del usuario"
      class="profile-avatar">

    <div class="profile-copy">
      <p class="profile-label mb-1">Sesión activa</p>
      <h2 class="profile-name mb-0">{{ nombreUsuario }}</h2>
    </div>
  </div>

  <div class="profile-actions">
    <div class="profile-divider"></div>

    <button
      type="button"
      class="menu-item"
      (click)="toggleProfileSection($event)">
      Perfil
    </button>

    <button
      type="button"
      class="menu-item menu-item-toggle"
      (click)="toggleDarkMode($event)">
      <span>Tema oscuro</span>
      <span class="theme-switch" [class.active]="temaOscuro"></span>
    </button>

    <button
      type="button"
      class="menu-item menu-item-danger"
      (click)="logout()">
      Cerrar sesión
    </button>
  </div>

  <div *ngIf="mostrarPerfil" class="profile-details">
    <p class="details-label mb-1">Perfil</p>
    <p class="details-copy mb-0">
      {{ nombreUsuario }}
    </p>
  </div>
</section>
