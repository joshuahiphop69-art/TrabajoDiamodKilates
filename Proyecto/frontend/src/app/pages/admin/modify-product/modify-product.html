<div class="modal-shell" *ngIf="producto">
  <div class="modal-card">
    <div class="modal-header bg-warning">
      <div>
        <p class="modal-kicker mb-1">Administrador</p>
        <h5 class="modal-title mb-0">Editar producto</h5>
      </div>
      <button type="button" class="btn-close" (click)="cerrar()"></button>
    </div>

    <div class="modal-body">
      <form class="edit-form">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="producto.nombre"
            name="nombre">
        </div>

        <div class="mb-3">
          <label class="form-label">Precio</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="producto.precio"
            name="precio">
        </div>

        <div class="mb-3">
          <label class="form-label">Material</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="producto.material"
            name="material">
        </div>

        <div class="mb-3">
          <label class="form-label">Categoría</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="producto.categoria"
            name="categoria">
        </div>

        <div class="mb-3">
          <label class="form-label">Etiqueta 1</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="producto.etiq_1"
            name="etiq_1">
        </div>

        <div class="mb-0">
          <label class="form-label">Etiqueta 2</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="producto.etiq_2"
            name="etiq_2">
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="cerrar()">
        Cancelar
      </button>

      <button type="button" class="btn btn-success" (click)="guardar()">
        Guardar cambios
      </button>
    </div>
  </div>
</div>
