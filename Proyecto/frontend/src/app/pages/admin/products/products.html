<div class="container mt-4">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-dark text-white">
      <h2 class="fs-3 fw-bold m-0">Listado de productos</h2>
    </div>

    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped custom-table align-middle">
          <thead class="table-dark">
            <tr>
              <th>Nombre del producto</th>
              <th>Catálogo</th>
              <th>Tipo de accesorio</th>
              <th>Etiquetas</th>
              <th>Precio</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let prod of prods">
              <td>{{ prod.nombre }}</td>
              <td>{{ prod.material }}</td>
              <td>{{ prod.categoria }}</td>
              <td>
                <span class="badge bg-secondary me-1">
                  {{ prod.etiq_1 }}
                </span>
                <span class="badge bg-info text-dark">
                  {{ prod.etiq_2 }}
                </span>
              </td>
              <td class="fw-bold text-success">
                ${{ prod.precio }}
              </td>
              <td class="text-center">
                <button
                  class="btn btn-warning btn-sm me-2"
                  (click)="editprod(prod)">
                  Modificar
                </button>

                <button
                  class="btn btn-danger btn-sm"
                  (click)="deleteprod(prod._id)">
                  Eliminar
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<app-modify-product
  [producto]="productoEnEdicion"
  (guardarCambios)="guardarCambios($event)"
  (cerrarModal)="cerrarModalEdicion()">
</app-modify-product>
