<div class="container mt-4" >
    <div class="card shadow-lg border-0">
        <div class="card-header bg-dark text-white">
            <h2 class="fs-3 fw-bold m-0">Listado de productos</h2>
        </div>

        <div class="card-body">
            <table class="table table-striped custom-table">
                <thead>
                    <tr>
                        <th>Nombre del producto</th>
                        <th>Categorías</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let prod of prods">
                        <td data-label="Nombre del producto">{{prod.nombre}}</td>
                        <td data-label="Categorías">
                            <div class="buttons-wrapper">
                                <button class="btn btn-sm menu-btn">
                                    {{prod.material}}
                                </button>
                                <button class="btn btn-sm menu-btn">
                                    {{prod.categoria}}
                                </button>
                                <button class="btn btn-sm menu-btn">
                                    {{prod.etiq_1}}
                                </button>
                                <button class="btn btn-sm menu-btn">
                                    {{prod.etiq_2}}
                                </button>
                            </div>
                        </td>
                        <td data-label="Precio">${{prod.precio}}</td>
                        <td data-label="Acciones">
                            <div class="buttons-wrapper">
                                <button class="btn btn-sm btn-action"
                                    (click)="deleteprod(prod._id)">
                                    Modificar
                                </button>
                                <button class="btn btn-sm btn-action"
                                    (click)="deleteprod(prod._id)">
                                    Eliminar
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
