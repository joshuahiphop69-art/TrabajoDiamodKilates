<div class="container mt-4">
    <h3 class="text-center mb-4">Inventario de Joyería</h3>
    <table class="table table-striped table-hover shadow">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Precio ($)</th>
                <th>Categoría</th>
                <th>Accesorio</th>
                <th>Existencias</th>
                <th>Modificar</th>
                <th>Eliminar</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let producto of productos; let i = index">
                <td>{{i+1}}</td>
                <td>{{producto.nombre}}</td>
                <td>{{producto.precio}}</td>
                <td>{{producto.categoria}}</td>
                <td>{{producto.accesorio}}</td>
                <td>{{producto.existencias}}</td>
                <!-- BOTON MODIFICAR -->
                <td>
                    <button
                        class="btn btn-warning btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#editarProductoModal"
                        (click)="abrirEdicion(producto)">
                        Modificar
                    </button>
                </td>
                <!-- BOTON ELIMINAR -->
                <td>
                    <button
                        class="btn btn-danger btn-sm"
                        (click)="eliminarProducto(i)">
                        Eliminar
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- MODAL DE EDICION -->
<app-modify-product
    [producto]="productoSeleccionado"
    (guardarCambios)="guardarCambios($event)">
</app-modify-product>
