<div class="container-fluid pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header bg-dark text-white text-center">
                    <h4 class="fw-bold mb-0">Iniciar Sesión</h4>
                </div>

                <div class="card-body">
                    <form #formContact="ngForm" (ngSubmit)="processForm(formContact)">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Número Telefónico</label>

                            <input
                                type="text"
                                class="form-control"
                                name="telefono"
                                ngModel
                                required
                                pattern="^[0-9]+$"
                                #telefonoCtrl="ngModel"
                                placeholder="Ingrese su número telefónico">

                            <div *ngIf="telefonoCtrl.invalid && telefonoCtrl.touched" class="text-danger mt-1">
                                <small *ngIf="telefonoCtrl.errors?.['required']">
                                El número telefónico es obligatorio
                                </small>

                                <small *ngIf="telefonoCtrl.errors?.['pattern']">
                                Solo se permiten números
                                </small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Contraseña</label>

                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                ngModel
                                required
                                minlength="6"
                                #passCtrl="ngModel"
                                placeholder="Ingrese su contraseña">

                            <div *ngIf="passCtrl.invalid && passCtrl.touched" class="text-danger mt-1">
                                <small *ngIf="passCtrl.errors?.['required']">
                                La contraseña es obligatoria
                                </small>

                                <small *ngIf="passCtrl.errors?.['minlength']">
                                Debe tener mínimo 6 caracteres
                                </small>
                            </div>
                        </div>

                        <button class="btn btn-primary" type="submit">
                            Iniciar sesión
                        </button>
                        <a class="btn text-decoration-underline" routerLink="/signup">
                            <small>Aún no tengo cuenta</small>
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalResult" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        {{ tituloModal }}
                    </h5>
                    <button class="btn-close" data-bs-dismiss="modal">
                    </button>
                </div>

                <div class="modal-body">
                    <p>{{ mensajeModal }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
