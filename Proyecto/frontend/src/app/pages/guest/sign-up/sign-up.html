<div class="container-fluid py-5">
    <div class="row justify-content-center"> 
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header bg-dark text-white text-center">
                    <h4 class="fw-bold mb-0">Crear cuenta</h4>
                </div>

                <div class="card-body">
                    <form #signInForm="ngForm" (ngSubmit)="registrar(signInForm)">

                        <!-- Nombre de Usuario -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre de Usuario</label>

                            <input
                                type="text"
                                class="form-control"
                                name="usuario"
                                [(ngModel)]="usuario"
                                required
                                minlength="3"
                                #usuarioCtrl="ngModel"
                                placeholder="Ingrese su nombre de usuario">

                            <div *ngIf="usuarioCtrl.invalid && usuarioCtrl.touched" class="text-danger mt-1">
                                <small *ngIf="usuarioCtrl.errors?.['required']">
                                El nombre de usuario es obligatorio
                                </small>

                                <small *ngIf="usuarioCtrl.errors?.['minlength']">
                                El nombre debe tener mínimo 3 caracteres
                                </small>
                            </div>
                        </div>

                        <!-- Número Telefónico -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Número Telefónico</label>

                            <input
                                type="text"
                                class="form-control"
                                name="telefono"
                                [(ngModel)]="telefono"
                                required
                                pattern="^[0-9]+$"
                                #telefonoCtrl="ngModel"
                                placeholder="Ingrese su número telefónico">

                            <div *ngIf="telefonoCtrl.invalid && telefonoCtrl.touched" class="text-danger mt-1">
                                <small *ngIf="telefonoCtrl.errors?.['required']">
                                El número telefónico es obligatorio
                                </small>

                                <small *ngIf="telefonoCtrl.errors?.['pattern']">
                                Solo se permiten números
                                </small>
                            </div>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Contraseña</label>

                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                [(ngModel)]="password"
                                required
                                minlength="6"
                                #passCtrl="ngModel"
                                placeholder="Ingrese su contraseña">

                            <div *ngIf="passCtrl.invalid && passCtrl.touched" class="text-danger mt-1">
                                <small *ngIf="passCtrl.errors?.['required']">
                                La contraseña es obligatoria
                                </small>

                                <small *ngIf="passCtrl.errors?.['minlength']">
                                Debe tener mínimo 6 caracteres
                                </small>
                            </div>
                        </div>

                        <!-- Confirmar contraseña -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Confirmar Contraseña</label>

                            <input
                                type="password"
                                class="form-control"
                                name="confirmPassword"
                                [(ngModel)]="confirmPassword"
                                required
                                placeholder="Confirme su contraseña">

                            <div *ngIf="password !== confirmPassword && confirmPassword" class="text-danger mt-1">
                                <small>Las contraseñas no coinciden</small>
                            </div>
                        </div>

                        <!-- Botón -->
                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary"
                                [disabled]="signInForm.invalid || password !== confirmPassword">

                                Registrarse
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
